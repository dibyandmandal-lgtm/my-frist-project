<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduNotes | Poornima University</title>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
        --primary: #6366f1;
        --accent: #f59e0b;
        --glass: rgba(255, 255, 255, 0.1);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Outfit', sans-serif;
    }

    body {
        overflow: hidden;
    }

    .main {
        width: 100%;
        height: 100vh;
        background: linear-gradient(rgba(64, 69, 79, 0.8), rgba(15, 23, 42, 0.8)),
                    url("https://images.shiksha.com/mediadata/images/1745496915phpyf90RL.jpeg");
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
    }

    /* ===== NAVBAR ===== */
    .navbar {
        height: 90px;
        padding: 0 6%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
    }

    .logo-group img {
        height: 60px;
        filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.5));
    }

    .menu ul {
        display: flex;
        list-style: none;
        gap: 35px;
        align-items: center;
    }

    .menu a {
        color: #fff;
        text-decoration: none;
        font-weight: 500;
        font-size: 15px;
        letter-spacing: 1px;
        transition: 0.3s;
        position: relative;
    }

    .menu a::after {
        content: '';
        position: absolute;
        bottom: -5px; left: 0;
        width: 0%; height: 2px;
        background: var(--accent);
        transition: 0.3s;
    }

    .menu a:hover::after { width: 100%; }

    .admin-link {
        background: linear-gradient(135deg, #f59e0b, #d97706);
        padding: 8px 20px;
        border-radius: 8px;
        color: white !important;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        border: none;
        font-size: 15px;
        letter-spacing: 1px;
    }

    .admin-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        background: linear-gradient(135deg, #d97706, #b45309);
    }

    .admin-link::after { display: none; }

    .admin-link ion-icon { font-size: 18px; }

    /* ===== CONTENT AREA ===== */
    .hero {
        flex: 1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 8%;
        gap: 40px;
    }

    .content {
        max-width: 650px;
        color: #fff;
    }

    @keyframes fadeInUp {
        to { opacity: 1; transform: translateY(0); }
    }

    .content h1 {
        font-size: clamp(40px, 6vw, 65px);
        line-height: 1.1;
        font-weight: 800;
        margin-bottom: 20px;
        opacity: 0;
        transform: translateY(30px);
        animation: fadeInUp 0.8s forwards;
    }

    .content h1 span {
        background: linear-gradient(to right, #818cf8, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .content p {
        font-size: 18px;
        color: #cbd5e1;
        margin-bottom: 30px;
        opacity: 0;
        transform: translateY(30px);
        animation: fadeInUp 0.8s 0.3s forwards;
    }

    /* ===== LOGIN FORM ===== */
    .form-container {
        background: var(--glass);
        backdrop-filter: blur(20px);
        padding: 40px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 100%;
        max-width: 400px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transform: scale(0.9);
        animation: fadeInUp 0.6s 0.6s forwards;
    }

    .form-container h3 {
        font-size: 24px;
        text-align: center;
        margin-bottom: 20px;
        color: #fff;
    }

    .tab-box {
        display: flex;
        background: rgba(15, 23, 42, 0.5);
        border-radius: 12px;
        margin-bottom: 25px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .tab-btn {
        flex: 1;
        padding: 12px;
        background: transparent;
        color: #94a3b8;
        border: none;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        transition: 0.3s;
    }

    .tab-btn.active {
        background: var(--primary);
        color: white;
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
    }

    .input-group {
        position: relative;
        margin-bottom: 20px;
    }

    .input-group input {
        width: 100%;
        padding: 12px 15px;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        color: white;
        outline: none;
        font-size: 16px;
        transition: 0.3s;
    }

    .input-group input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
    }

    .login-btn {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        margin-top: 10px;
    }

    .login-btn:hover {
        background: #4f46e5;
        transform: translateY(-2px);
    }

    .social-icons {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 30px;
    }

    .social-icons ion-icon {
        font-size: 24px;
        color: #94a3b8;
        cursor: pointer;
        transition: 0.3s;
    }

    .social-icons ion-icon:hover {
        color: var(--accent);
        transform: translateY(-3px);
    }

    /* ===== ADMIN MODAL OVERLAY ===== */
    .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(8px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }

    .modal-overlay.active {
        display: flex;
    }

    /* ===== ADMIN MODAL BOX ===== */
    .admin-modal {
        background: linear-gradient(145deg, rgba(15, 23, 42, 0.95), rgba(30, 20, 60, 0.95));
        border: 1px solid rgba(245, 158, 11, 0.3);
        border-radius: 24px;
        padding: 45px 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 40px rgba(245,158,11,0.1);
        animation: modalIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        position: relative;
    }

    @keyframes modalIn {
        from { opacity: 0; transform: scale(0.85) translateY(20px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Shield icon */
    .modal-icon {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
    }

    .shield-circle {
        width: 68px;
        height: 68px;
        border-radius: 50%;
        background: rgba(245,158,11,0.12);
        border: 2px solid rgba(245,158,11,0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 25px rgba(245,158,11,0.25);
        animation: glow 2.5s ease-in-out infinite;
    }

    @keyframes glow {
        0%, 100% { box-shadow: 0 0 20px rgba(245,158,11,0.2); }
        50%       { box-shadow: 0 0 40px rgba(245,158,11,0.5); }
    }

    .shield-circle ion-icon {
        font-size: 32px;
        color: #f59e0b;
    }

    .admin-modal h2 {
        text-align: center;
        color: #fff;
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 6px;
    }

    .admin-modal .admin-subtitle {
        text-align: center;
        color: #64748b;
        font-size: 13px;
        margin-bottom: 30px;
        letter-spacing: 0.5px;
    }

    .admin-modal .input-group input {
        width: 100%;
        padding: 13px 15px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(245, 158, 11, 0.2);
        border-radius: 12px;
        color: white;
        outline: none;
        font-size: 15px;
        transition: 0.3s;
        font-family: 'Outfit', sans-serif;
    }

    .admin-modal .input-group input::placeholder {
        color: #475569;
    }

    .admin-modal .input-group input:focus {
        border-color: #f59e0b;
        box-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
    }

    .admin-submit-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3);
        margin-top: 8px;
        font-family: 'Outfit', sans-serif;
        letter-spacing: 0.5px;
    }

    .admin-submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 25px rgba(245, 158, 11, 0.45);
        background: linear-gradient(135deg, #d97706, #b45309);
    }

    /* Close button */
    .modal-close {
        position: absolute;
        top: 18px;
        right: 20px;
        background: none;
        border: none;
        color: #64748b;
        cursor: pointer;
        font-size: 22px;
        display: flex;
        align-items: center;
        transition: 0.2s;
    }

    .modal-close:hover {
        color: #ef4444;
        transform: rotate(90deg);
    }

    /* Error message */
    .error-msg {
        display: none;
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.35);
        color: #fca5a5;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 16px;
        text-align: center;
    }

    .error-msg.show { display: block; }

    /* ===== MOBILE ===== */
    @media (max-width: 992px) {
        .hero { flex-direction: column; text-align: center; justify-content: center; margin-top: 50px; }
        .menu { display: none; }
        .content { margin-bottom: 40px; }
    }
  </style>
</head>
<body>

<div class="main">
  <nav class="navbar">
    <div class="logo-group">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSP1gWVjDn9Ca2T5BB2tEblNAKcC972B4UfAg&s" alt="EduNotes">
    </div>
    <div class="menu">
      <ul>
        <li><a href="loging page.html">HOME</a></li>
        <li><a href="description1.html">ABOUT</a></li>
        <li><a href="contact.html">CONTACT</a></li>
        <li><a href="#">SUPPORT</a></li>
        <!-- Admin Panel button now opens modal -->
        <li>
          <button class="admin-link" onclick="openAdminModal()">
            <ion-icon name="shield-checkmark-outline"></ion-icon>
            ADMIN PANEL
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <section class="hero">
    <div class="content">
      <h1>Elevate Your Learning at <span>Poornima.</span></h1>
      <p>Access exclusive handwritten notes, previous year questions, and engineering resources specially curated for your success.</p>
    </div>

    <div class="form-container">
      <form id="loginForm">
        <h3 id="form-title">Student Login</h3>

        <div class="tab-box">
          <button type="button" class="tab-btn active" id="studentTab" onclick="switchTab('student')">Student</button>
          <button type="button" class="tab-btn" id="facultyTab" onclick="switchTab('faculty')">Faculty</button>
        </div>

        <div class="input-group">
          <input type="email" id="email" placeholder="Student Email (@poornima.edu.in)" required>
        </div>
        <div class="input-group">
          <input type="password" id="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn" id="submitBtn">Launch Portal</button>

        <div class="social-icons">
          <ion-icon name="logo-facebook"></ion-icon>
          <ion-icon name="logo-instagram"></ion-icon>
          <ion-icon name="logo-linkedin"></ion-icon>
          <ion-icon name="logo-youtube"></ion-icon>
        </div>
      </form>
    </div>
  </section>
</div>

<!-- ===== ADMIN LOGIN MODAL ===== -->
<div class="modal-overlay" id="adminModal" onclick="handleOverlayClick(event)">
  <div class="admin-modal">

    <button class="modal-close" onclick="closeAdminModal()">
      <ion-icon name="close-outline"></ion-icon>
    </button>

    <div class="modal-icon">
      <div class="shield-circle">
        <ion-icon name="shield-checkmark-outline"></ion-icon>
      </div>
    </div>

    <h2>Admin Panel</h2>
    <p class="admin-subtitle">AUTHORIZED ACCESS ONLY</p>

    <div class="error-msg" id="adminError">
      Username and password invalid.
    </div>

    <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
      <div class="input-group">
        <input type="email" id="adminEmail" placeholder="Admin Gmail" required autocomplete="off">
      </div>
      <div class="input-group">
        <input type="password" id="adminPassword" placeholder="Password" required>
      </div>
      <button type="submit" class="admin-submit-btn">
        Access Admin Panel
      </button>
    </form>

  </div>
</div>

<script>
  // ===== OPEN / CLOSE MODAL =====
  function openAdminModal() {
    document.getElementById('adminModal').classList.add('active');
    document.getElementById('adminEmail').focus();
    document.getElementById('adminError').classList.remove('show');
    document.getElementById('adminLoginForm').reset();
  }

  function closeAdminModal() {
    document.getElementById('adminModal').classList.remove('active');
  }

  // Close on overlay click (outside the box)
  function handleOverlayClick(e) {
    if (e.target === document.getElementById('adminModal')) {
      closeAdminModal();
    }
  }

  // Close on ESC key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeAdminModal();
  });

  // ===== ADMIN LOGIN VALIDATION =====
  async function handleAdminLogin(e) {
    e.preventDefault();
    const email    = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;

    try {
      const res = await fetch("http://localhost:8081/api/admin/adminlogin", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email: email,
          password: password
        })
      });

      if (!res.ok) {
        showAdminError('Username and password invalid.');
        return;
      }

      const text = await res.text();
      const admin = text ? JSON.parse(text) : null;

      if (!admin) {
        showAdminError('Username and password invalid.');
        return;
      }

      alert('Login Successful! Redirecting to admin panel...');

      // Store session
      localStorage.setItem('adminSession', 'true');
      localStorage.setItem('adminUsername', admin.email || email);

      closeAdminModal();
      window.location.href = "admin.html";
    } catch (error) {
      console.error("Error:", error);
      showAdminError('Server error. Please try again later.');
    }
  }

  function showAdminError(msg) {
    const errorBox = document.getElementById('adminError');
    errorBox.innerText = msg;
    errorBox.classList.add('show');
    document.getElementById('adminPassword').value = "";
    document.getElementById('adminPassword').focus();
  }

  // ===== STUDENT / FACULTY TAB SWITCHER =====
  let currentRole = 'student';

  function switchTab(role) {
    currentRole = role;
    document.getElementById('studentTab').classList.toggle('active', role === 'student');
    document.getElementById('facultyTab').classList.toggle('active', role === 'faculty');

    const formTitle = document.getElementById('form-title');
    const emailInput = document.getElementById('email');
    const submitBtn  = document.getElementById('submitBtn');

    if (role === 'student') {
      formTitle.innerText     = "Student Login";
      emailInput.placeholder  = "Student Email (@poornima.edu.in)";
      submitBtn.innerText     = "Launch Portal";
    } else {
      formTitle.innerText     = "Faculty Login";
      emailInput.placeholder  = "Faculty ID or Email";
      submitBtn.innerText     = "Access Dashboard";
    }
  }

  // ===== STUDENT / FACULTY LOGIN =====
  function buildFacultyName(identifier) {
    const localPart = String(identifier || '').split('@')[0];
    return localPart
      .replace(/[._-]+/g, ' ')
      .split(/\s+/)
      .filter(Boolean)
      .map(word => word.charAt(0).toUpperCase() + word.slice(1))
      .join(' ') || 'Faculty';
  }

  document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const email = document.getElementById("email").value.trim().toLowerCase();

    if (currentRole === 'student') {
      if (email.endsWith("@poornima.edu.in")) {
        window.location.href = "Puportal(student).html";
      } else {
        alert("⚠️ Student Access Denied: Please use your official @poornima.edu.in email.");
      }
    } else {
      if (email.includes("poornima")) {
        const sessionFaculty = {
          fullName: buildFacultyName(email),
          email: email
        };
        localStorage.setItem('facultySession', JSON.stringify(sessionFaculty));
        localStorage.setItem('activeFacultyProfile', JSON.stringify(sessionFaculty));
        window.location.href = "Puportal(faculty).html";
      } else {
        alert("⚠️ Faculty Access Denied: Unrecognized Faculty Email/ID.");
      }
    }
  });
</script>

</body>
</html>
